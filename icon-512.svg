<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 -->
  <rect width="512" height="512" rx="107" fill="#0a0a0f"/>

  <!-- NT$ 文字 -->
  <text x="256" y="139" font-family="monospace" font-size="69" font-weight="500" text-anchor="middle" fill="#ffffff" opacity="0.85">NT$</text>

  <!-- 長條圖：以紅為主，穿插一根綠，最高最亮是紅 -->
  <!-- bar 1 紅 -->
  <rect x="75" y="315" width="59" height="123" rx="13" fill="#ef4444" opacity="0.6"/>
  <!-- bar 2 綠（跌） -->
  <rect x="155" y="288" width="59" height="150" rx="13" fill="#22c55e" opacity="0.6"/>
  <!-- bar 3 紅 -->
  <rect x="235" y="256" width="59" height="182" rx="13" fill="#ef4444" opacity="0.75"/>
  <!-- bar 4 紅 -->
  <rect x="315" y="208" width="59" height="230" rx="13" fill="#ef4444" opacity="0.88"/>
  <!-- bar 5 紅（最高最亮） -->
  <rect x="395" y="155" width="59" height="283" rx="13" fill="#ef4444"/>

  <!-- 底線 -->
  <rect x="59" y="443" width="411" height="8" rx="4" fill="#ef4444" opacity="0.4"/>
</svg>
