// === 自訂下拉選單 picker ===
function showPicker(selectEl, title) {
  const options = Array.from(selectEl.options).map(o => ({
    value: o.value,
    label: o.textContent
  }));
  const currentVal = selectEl.value;

  const mask = document.createElement('div');
  mask.className = 'picker-mask';

  const box = document.createElement('div');
  box.className = 'picker-box';
  box.innerHTML = `
    <div class="picker-title">${title || '請選擇'}</div>
    <div class="picker-list">
      ${options.map(o => `<div class="picker-item ${o.value === currentVal ? 'active' : ''}" data-value="${o.value.replace(/"/g,'&quot;')}">${o.label}</div>`).join('')}
    </div>
    <div class="picker-cancel">取消</div>
  `;
  mask.appendChild(box);
  document.body.appendChild(mask);

  function close() {
    mask.style.transition = 'opacity 0.1s';
    mask.style.opacity = '0';
    setTimeout(() => { if (mask.parentNode) document.body.removeChild(mask); }, 100);
  }

  box.querySelectorAll('.picker-item').forEach(it => {
    let touched = false;
    let touchStartPos = null; // 記錄 touchstart 的位置，用來判斷是滑動還是點擊
    function pick() {
      if (touched) return;
      touched = true;
      const v = it.getAttribute('data-value');
      selectEl.value = v;
      selectEl.dispatchEvent(new Event('change', {bubbles: true}));
      close();
    }
    it.addEventListener('touchstart', function(e) {
      if (e.touches[0]) {
        touchStartPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      }
    }, {passive: true});
    it.addEventListener('touchend', function(e) {
      // 如果是滑動（移動超過 10px），不選中，讓使用者繼續捲動
      if (touchStartPos && e.changedTouches[0]) {
        const dx = Math.abs(e.changedTouches[0].clientX - touchStartPos.x);
        const dy = Math.abs(e.changedTouches[0].clientY - touchStartPos.y);
        touchStartPos = null;
        if (dx > 10 || dy > 10) return; // 滑動中，不觸發
      }
      e.preventDefault();
      pick();
    });
    it.addEventListener('click', pick);
  });

  const _cancelBtn = box.querySelector('.picker-cancel');
  let _cancelTouched = false;
  function _cancelPick() {
    if (_cancelTouched) return;
    _cancelTouched = true;
    close();
  }
  _cancelBtn.addEventListener('touchend', function(e) { e.preventDefault(); _cancelPick(); });
  _cancelBtn.addEventListener('click', _cancelPick);
  let _maskTouched = false;
  function maskClose(e) {
    if (e.target !== mask) return;
    if (_maskTouched) return;
    _maskTouched = true;
    close();
  }
  mask.addEventListener('touchend', function(e) {
    if (e.target !== mask) return;
    e.preventDefault();
    maskClose(e);
  });
  mask.addEventListener('click', maskClose);
}

// 攔截 cashflow-select — 必須在 pointerdown/mousedown 就阻止
function handleSelectIntercept(e) {
  const s = e.target.closest('.cashflow-select');
  if (!s) return;
  e.preventDefault();
  e.stopPropagation();
  // 立刻 blur 並強制 disabled 一瞬間阻止原生 picker
  s.blur();
  s.setAttribute('disabled', 'disabled');
  const wrap = s.closest('.cashflow-select-wrap');
  const label = wrap ? wrap.querySelector('.cashflow-select-label') : null;
  showPicker(s, label ? label.textContent : '請選擇');
  // 稍後恢復可用（讓 showPicker 後續 dispatch change 能收到）
  setTimeout(() => s.removeAttribute('disabled'), 100);
}

// mousedown (桌面)：攔截 select
document.addEventListener('mousedown', handleSelectIntercept, true);

// 手機：追蹤 touchstart 位置，touchend 時才判斷是否為「點擊」（位置幾乎沒變）
let _selectTouchStart = null;
document.addEventListener('touchstart', function(e) {
  const s = e.target.closest('.cashflow-select');
  if (!s) return;
  if (e.touches[0]) {
    _selectTouchStart = {
      x: e.touches[0].clientX,
      y: e.touches[0].clientY,
      select: s,
      time: Date.now()
    };
  }
}, {passive: true});

document.addEventListener('touchend', function(e) {
  if (!_selectTouchStart) return;
  const start = _selectTouchStart;
  _selectTouchStart = null;

  // 必須在同一個 select 內抬起
  const s = e.target.closest('.cashflow-select');
  if (!s || s !== start.select) return;

  // 檢查移動距離 — 超過 10px 就視為滾動，不觸發 picker
  const t = e.changedTouches[0];
  if (!t) return;
  const dx = Math.abs(t.clientX - start.x);
  const dy = Math.abs(t.clientY - start.y);
  if (dx > 10 || dy > 10) return;

  // 檢查時間 — 太長按可能也不是點擊
  if (Date.now() - start.time > 500) return;

  e.preventDefault();
  e.stopPropagation();
  handleSelectIntercept(e);
}, {passive: false});

// touchmove 時清除追蹤（滾動中就不觸發）
document.addEventListener('touchmove', function(e) {
  if (!_selectTouchStart) return;
  if (!e.touches[0]) return;
  const dx = Math.abs(e.touches[0].clientX - _selectTouchStart.x);
  const dy = Math.abs(e.touches[0].clientY - _selectTouchStart.y);
  if (dx > 10 || dy > 10) {
    _selectTouchStart = null;
  }
}, {passive: true});

// 額外：select 自己的 focus 也攔（備援，如鍵盤聚焦）
document.addEventListener('focusin', function(e) {
  const s = e.target.closest('.cashflow-select');
  if (!s) return;
  s.blur();
  // 不自動打開 picker，避免滑動時誤觸
});





// 禁用長按選單（剪下/複製/貼上）
document.addEventListener('contextmenu', function(e) {
  // 只在輸入框以外的地方阻止（讓使用者還是能貼上）
  if (!e.target.closest('input[type=text], textarea')) {
    e.preventDefault();
  }
});

// 進一步：在 input 上也阻止原生的長按選取選單
document.querySelectorAll('input').forEach(inp => {
  inp.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    e.stopPropagation();
    return false;
  });
});

// 給動態加入的 input 也綁
const origAppendChild = Element.prototype.appendChild;
// 改用 MutationObserver 監視新增的 input
const inputObserver = new MutationObserver(muts => {
  muts.forEach(m => {
    m.addedNodes.forEach(node => {
      if (node.nodeType === 1) {
        const inputs = node.querySelectorAll ? node.querySelectorAll('input') : [];
        inputs.forEach(inp => {
          inp.addEventListener('contextmenu', function(e) {
            e.preventDefault();
            return false;
          });
        });
      }
    });
  });
});

// 根據輸入值長度自動縮小字體，避免長數字被遮住
function adjustInputFontSize(el) {
  if (!el) return;
  const len = (el.value || '').length;
  el.classList.remove('shrink-1', 'shrink-2', 'shrink-3');
  if (len >= 14) el.classList.add('shrink-3');       // 10,000,000,000 (100億)
  else if (len >= 12) el.classList.add('shrink-2');  // 100,000,000 (1億) 等級
  else if (len >= 10) el.classList.add('shrink-1');  // 1,000,000 (百萬) 等級
}

document.getElementById('principal').addEventListener('focus',function(){this.select();});
document.getElementById('principal').addEventListener('blur',function(){formatNum('principal');adjustInputFontSize(this);});
document.getElementById('principal').addEventListener('input',function(){
  // 即時檢查上限（若超過，提示並重置值）
  const raw = +(this.value.replace(/[,，]/g,''))||0;
  if (raw > MAX_AMOUNT) {
    notifyCap();
    this.value = MAX_AMOUNT.toLocaleString('zh-TW');
  }
  adjustInputFontSize(this);
  calc();
});
